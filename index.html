  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

n        <rect x=\"4\" y=\"8\" width=\"16\" height=\"12\" rx=\"2\"><\u002Frect>\n        <path d=\"M2 14h2\"><\u002Fpath>\n        <path d=\"M20 14h2\"><\u002Fpath>\n        <path d=\"M9 13v2\"><\u002Fpath>\n        <path d=\"M15 13v2\"><\u002Fpath>\n      <\u002Fsvg>\n      Portugal<br>\n      <a href=\"mailto:nunofseca@gmail.com\" style=\"color: oklch(0.6 0.02 250); text-decoration: none;\">nunofseca@gmail.com<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div data-main=\"{{ true }}\" style=\"margin-left: 260px; flex: 1; max-width: 880px; padding: 0 56px;\">\n\n    <section id=\"intro\" style=\"padding: 96px 0 72px; display: flex; align-items: center; gap: 36px; border-bottom: 1px solid oklch(0.24 0.012 250); position: relative; overflow: hidden;\">\n      <svg viewBox=\"0 0 24 24\" style=\"position: absolute; right: -6px; top: 20px; width: 170px; height: 170px; pointer-events: none; user-select: none; opacity: 0.09;\" xmlns=\"http://www.w3.org/2000/svg\" fill=\"none\" stroke=\"oklch(0.95 0.01 250)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n        <path d=\"M12 8V4H8\"><\u002Fpath>\n        <rect x=\"4\" y=\"8\" width=\"16\" height=\"12\" rx=\"2\"><\u002Frect>\n        <path d=\"M2 14h2\"><\u002Fpath>\n        <path d=\"M20 14h2\"><\u002Fpath>\n        <path d=\"M9 13v2\"><\u002Fpath>\n        <path d=\"M15 13v2\"><\u002Fpath>\n      <\u002Fsvg>\n      <div data-hero-photo=\"{{ true }}\" style=\"width: 110px; height: 110px; border-radius: 50%; flex-shrink: 0; background-image: url(&quot;ef8fa1dd-204b-4872-ae18-2d21d13ba66b&quot;); background-size: cover; background-position: center 20%; border: 1px solid oklch(0.32 0.012 250); position: relative; z-index: 1;\"><\u002Fdiv>\n      <div style=\"position: relative; z-index: 1;\">\n        <h1 style=\"margin: 0 0 10px; font-size: 40px; font-weight: 800; color: oklch(0.96 0.01 250); letter-spacing: -0.01em;\">Nuno Filipe Seca<\u002Fh1>\n        <div style=\"font-size: 17px; color: oklch(0.78 0.13 195); font-weight: 600; margin-bottom: 14px;\">RPA Developer — Python &amp; Process Automation<\u002Fdiv>\n        <p style=\"margin: 0; font-size: 14px; color: oklch(0.65 0.015 250); max-width: 480px; line-height: 1.7;\">Building Python automations that remove manual, repetitive work from real business processes — from hospital billing to browser tools.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"about\" style=\"padding: 64px 0; border-bottom: 1px solid oklch(0.24 0.012 250);\">\n      <div style=\"{{ sectionLabelStyle }}\"><span style=\"{{ sectionNumStyle }}\">01<\u002Fspan> About<\u002Fdiv>\n      <p style=\"font-size: 15px; line-height: 1.9; color: oklch(0.78 0.01 250); max-width: 640px; margin: 0;\">\n        I spent five years in IT support and helpdesk roles (2020–2025), learning how real operational systems break and where people lose time to repetitive manual work. Since 2025 I've moved into RPA development full-time, building Python-based automations for a hospital group's billing and insurance operations — alongside coding small tools of my own, including a published Chrome extension. I'm self-taught and have been writing code on and off for small projects for most of my life.\n      <\u002Fp>\n    <\u002Fsection>\n\n    <section id=\"education\" style=\"padding: 64px 0; border-bottom: 1px solid oklch(0.24 0.012 250);\">\n      <div style=\"{{ sectionLabelStyle }}\"><span style=\"{{ sectionNumStyle }}\">02<\u002Fspan> Education<\u002Fdiv>\n      <p style=\"margin: 0; font-size: 14px; line-height: 1.8; color: oklch(0.5 0.015 250); font-style: italic;\">Add your school, degree, and year here.<\u002Fp>\n    <\u002Fsection>\n\n    <section id=\"skills\" style=\"padding: 64px 0; border-bottom: 1px solid oklch(0.24 0.012 250);\">\n      <div style=\"{{ sectionLabelStyle }}\"><span style=\"{{ sectionNumStyle }}\">03<\u002Fspan> Skills<\u002Fdiv>\n      <div style=\"display: flex; flex-wrap: wrap; gap: 10px;\">\n        <sc-for list=\"{{ skills }}\" as=\"skill\" hint-placeholder-count=\"10\">\n          <span style=\"font-size: 13px; padding: 8px 14px; background: oklch(0.2 0.012 250); border: 1px solid oklch(0.3 0.012 250); border-radius: 3px; color: oklch(0.82 0.01 250);\">{{ skill }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"experience\" style=\"padding: 64px 0; border-bottom: 1px solid oklch(0.24 0.012 250);\">\n      <div style=\"{{ sectionLabelStyle }}\"><span style=\"{{ sectionNumStyle }}\">04<\u002Fspan> Experience<\u002Fdiv>\n\n      <sc-for list=\"{{ experience }}\" as=\"job\" hint-placeholder-count=\"3\">\n        <div style=\"margin-bottom: 32px; padding-bottom: 32px; border-bottom: 1px dashed oklch(0.26 0.012 250);\">\n          <div style=\"display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 8px; margin-bottom: 8px;\">\n            <div style=\"font-size: 16px; font-weight: 700; color: oklch(0.93 0.01 250);\">{{ job.role }}<\u002Fdiv>\n            <div style=\"font-size: 12px; color: oklch(0.78 0.13 195); font-weight: 600;\">{{ job.dates }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size: 13px; color: oklch(0.6 0.015 250); margin-bottom: 10px;\">{{ job.company }}<\u002Fdiv>\n          <p style=\"margin: 0; font-size: 14px; line-height: 1.75; color: oklch(0.72 0.012 250); max-width: 620px;\">{{ job.desc }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <p style=\"font-size: 12px; color: oklch(0.48 0.015 250); line-height: 1.7; margin: 0;\">Earlier, I held various part-time roles (McDonald's, Pans, Worten) while completing my studies.<\u002Fp>\n    <\u002Fsection>\n\n    <section id=\"projects\" style=\"padding: 64px 0; border-bottom: 1px solid oklch(0.24 0.012 250);\">\n      <div style=\"{{ sectionLabelStyle }}\"><span style=\"{{ sectionNumStyle }}\">05<\u002Fspan> Projects<\u002Fdiv>\n      <p style=\"font-size: 13px; color: oklch(0.6 0.015 250); margin: 0 0 28px; line-height: 1.7; max-width: 620px;\">\n        A selection of automation systems I've designed and built at TrofaSaude. All handle high-volume, rules-based financial processes that previously required manual work.\n      <\u002Fp>\n\n      <sc-for list=\"{{ workProjects }}\" as=\"proj\" hint-placeholder-count=\"4\">\n        <div style=\"margin-bottom: 24px; padding: 22px 24px; background: oklch(0.185 0.012 250); border: 1px solid oklch(0.27 0.012 250); border-radius: 4px;\">\n          <div style=\"font-size: 15px; font-weight: 700; color: oklch(0.92 0.01 250); margin-bottom: 8px;\">{{ proj.title }}<\u002Fdiv>\n          <p style=\"margin: 0; font-size: 13px; line-height: 1.7; color: oklch(0.68 0.012 250);\">{{ proj.desc }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"margin-top: 28px; padding-top: 24px; border-top: 1px dashed oklch(0.26 0.012 250);\">\n        <div style=\"font-size: 13px; color: oklch(0.6 0.015 250); margin-bottom: 14px;\">Personal projects &amp; source code:<\u002Fdiv>\n        <sc-for list=\"{{ githubRepos }}\" as=\"repo\" hint-placeholder-count=\"3\">\n          <a href=\"{{ repo.url }}\" target=\"_blank\" rel=\"noopener\" style=\"display: flex; justify-content: space-between; align-items: baseline; gap: 16px; padding: 14px 0; border-bottom: 1px dashed oklch(0.24 0.012 250); text-decoration: none; color: inherit;\" style-hover=\"{{ { borderColor: 'oklch(0.55 0.11 195)' } }}\">\n            <span style=\"font-size: 14px; font-weight: 600; color: oklch(0.85 0.01 250);\">{{ repo.name }}<\u002Fspan>\n            <span style=\"font-size: 12px; color: oklch(0.55 0.015 250); text-align: right; max-width: 380px;\">{{ repo.desc }}<\u002Fspan>\n          <\u002Fa>\n        <\u002Fsc-for>\n        <a href=\"https://github.com/RatherFancyCat\" target=\"_blank\" rel=\"noopener\" style=\"display: inline-block; margin-top: 18px; font-size: 12px; color: oklch(0.78 0.13 195); text-decoration: none;\">view all repositories →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"extension\" style=\"padding: 64px 0; border-bottom: 1px solid oklch(0.24 0.012 250);\">\n      <div style=\"{{ sectionLabelStyle }}\"><span style=\"{{ sectionNumStyle }}\">06<\u002Fspan> Chrome Extension<\u002Fdiv>\n      <div style=\"padding: 28px; background: oklch(0.185 0.012 250); border: 1px solid oklch(0.27 0.012 250); border-radius: 4px; max-width: 620px;\">\n        <div style=\"font-size: 17px; font-weight: 700; color: oklch(0.93 0.01 250); margin-bottom: 6px;\">White-Out Spell Checker<\u002Fdiv>\n        <div style=\"font-size: 12px; color: oklch(0.78 0.13 195); font-weight: 600; margin-bottom: 14px;\">Published on the Chrome Web Store<\u002Fdiv>\n        <p style=\"margin: 0 0 18px; font-size: 14px; line-height: 1.75; color: oklch(0.72 0.012 250);\">Corrects spelling errors in real time across any website, replacing misspelled words automatically based on a custom, user-fed dictionary — rather than just flagging them.<\u002Fp>\n        <a href=\"https://chromewebstore.google.com/detail/white-out-spell-checker/fdiadagnneccmgfgddbnnnobgafeodid\" target=\"_blank\" rel=\"noopener\" style=\"font-size: 13px; color: oklch(0.78 0.13 195); text-decoration: none; border-bottom: 1px solid oklch(0.5 0.11 195); padding-bottom: 2px;\">view on Chrome Web Store →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"hobbies\" style=\"padding: 64px 0; border-bottom: 1px solid oklch(0.24 0.012 250);\">\n      <div style=\"{{ sectionLabelStyle }}\"><span style=\"{{ sectionNumStyle }}\">07<\u002Fspan> Outside of Work<\u002Fdiv>\n      <p style=\"margin: 0; font-size: 14px; line-height: 1.8; color: oklch(0.5 0.015 250); font-style: italic;\">Add a couple of hobbies or personal notes here.<\u002Fp>\n    <\u002Fsection>\n\n    <section id=\"contact\" style=\"padding: 64px 0 96px;\">\n      <div style=\"{{ sectionLabelStyle }}\"><span style=\"{{ sectionNumStyle }}\">08<\u002Fspan> Contact<\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 14px; max-width: 400px;\">\n        <a href=\"mailto:nunofseca@gmail.com\" style=\"display: flex; justify-content: space-between; font-size: 14px; color: oklch(0.85 0.01 250); text-decoration: none; padding: 12px 0; border-bottom: 1px dashed oklch(0.26 0.012 250);\">\n          <span style=\"color: oklch(0.55 0.015 250);\">email<\u002Fspan><span>nunofseca@gmail.com<\u002Fspan>\n        <\u002Fa>\n        <a href=\"https://github.com/RatherFancyCat\" target=\"_blank\" rel=\"noopener\" style=\"display: flex; justify-content: space-between; font-size: 14px; color: oklch(0.85 0.01 250); text-decoration: none; padding: 12px 0; border-bottom: 1px dashed oklch(0.26 0.012 250);\">\n          <span style=\"color: oklch(0.55 0.015 250);\">github<\u002Fspan><span>github.com/RatherFancyCat<\u002Fspan>\n        <\u002Fa>\n        <a href=\"https://www.linkedin.com/in/nunofseca/\" target=\"_blank\" rel=\"noopener\" style=\"display: flex; justify-content: space-between; font-size: 14px; color: oklch(0.85 0.01 250); text-decoration: none; padding: 12px 0; border-bottom: 1px dashed oklch(0.26 0.012 250);\">\n          <span style=\"color: oklch(0.55 0.015 250);\">linkedin<\u002Fspan><span>linkedin.com/in/nunofseca<\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { active: 'intro', pastIntro: false };\n\n  navItems = [\n    { id: 'intro', href: '#intro', num: '00', label: 'Intro' },\n    { id: 'about', href: '#about', num: '01', label: 'About' },\n    { id: 'education', href: '#education', num: '02', label: 'Education' },\n    { id: 'skills', href: '#skills', num: '03', label: 'Skills' },\n    { id: 'experience', href: '#experience', num: '04', label: 'Experience' },\n    { id: 'projects', href: '#projects', num: '05', label: 'Projects' },\n    { id: 'extension', href: '#extension', num: '06', label: 'Extension' },\n    { id: 'hobbies', href: '#hobbies', num: '07', label: 'Outside of Work' },\n    { id: 'contact', href: '#contact', num: '08', label: 'Contact' },\n  ];\n\n  experience = [\n    {\n      role: 'RPA Developer',\n      company: 'TrofaSaude',\n      dates: '2025 — Present',\n      desc: 'Designing and building Python automations for the hospital group\\u2019s billing and insurance operations, including surgery authorization requests, invoice reconciliation, patient debt recovery, and insurer payment matching.',\n    },\n    {\n      role: 'IT Support / Helpdesk',\n      company: 'TrofaSaude',\n      dates: '2021 — 2025',\n      desc: 'Frontline technical support across hospital systems, resolving day-to-day issues for clinical and administrative staff.',\n    },\n    {\n      role: 'Support Agent',\n      company: 'Manpower',\n      dates: '2020 — 2021',\n      desc: 'Technical support placement, first professional role in IT.',\n    },\n  ];\n\n  workProjects = [\n    {\n      title: 'Inpatient Surgery Authorization Automation',\n      desc: 'Automates requests for insurance authorization and copayment coverage for doctor-prescribed inpatient surgeries \\u2014 pulling patient records and prescriptions and filing with multiple public and private insurers.',\n    },\n    {\n      title: 'Internal Billing Reconciliation Platform',\n      desc: 'A React + internal-API platform letting the Billing team batch-feed already-paid invoices for receipt issuance against a legacy system with no API of its own \\u2014 processing roughly 18,000 receipts a night.',\n    },\n    {\n      title: 'Patient Debt Recovery Automation',\n      desc: 'Two-stage system: after 10 days, applies any credit a patient has on file to an outstanding bill; unresolved balances move to a second stage on day 11 where a late fee is applied.',\n    },\n    {\n      title: 'Insurance Payment Matching Platform',\n      desc: 'A React + internal-API tool that matches pending insurer bills against bank transfers by reference number and value, auto-issuing verification receipts, with a rules-based manual-match option for edge cases.',\n    },\n  ];\n\n  githubRepos = [\n    { name: 'ADS-Tab-Manager', url: 'https://github.com/RatherFancyCat/ADS-Tab-Manager', desc: 'Renames tabs and jumps between them in Azure Data Studio.' },\n    { name: 'ADS-Copilot-Integration', url: 'https://github.com/RatherFancyCat/ADS-Copilot-Integration', desc: 'Adds Copilot chat to Azure Data Studio.' },\n    { name: 'White-Out-Extension', url: 'https://github.com/RatherFancyCat/White-Out-Extension', desc: 'Source for the White-Out Spell Checker Chrome extension.' },\n  ];\n\n  skills = ['Python', 'RPA', 'JavaScript', 'React', 'REST APIs', 'SQL', 'Azure Data Studio', 'Git / GitHub', 'Process Automation', 'Healthcare Billing Systems'];\n\n  componentDidMount() {\n    const REFERENCE_LINE = 140;\n\n    this.handleScroll = () => {\n      let currentId = this.navItems[0].id;\n      for (const item of this.navItems) {\n        const el = document.getElementById(item.id);\n        if (el && el.getBoundingClientRect().top <= REFERENCE_LINE) {\n          currentId = item.id;\n        }\n      }\n      if (currentId !== this.state.active) this.setState({ active: currentId });\n\n      const introEl = document.getElementById('intro');\n      if (introEl) {\n        const pastIntro = introEl.getBoundingClientRect().bottom < 80;\n        if (pastIntro !== this.state.pastIntro) this.setState({ pastIntro });\n      }\n    };\n    window.addEventListener('scroll', this.handleScroll, { passive: true });\n    requestAnimationFrame(() => this.handleScroll());\n  }\n\n  componentWillUnmount() {\n    window.removeEventListener('scroll', this.handleScroll);\n  }\n\n  makeScrollHandler(id) {\n    return (e) => {\n      e.preventDefault();\n      const el = document.getElementById(id);\n      if (el) {\n        const target = el.getBoundingClientRect().top + window.pageYOffset - 24;\n        window.scrollTo({ top: target, left: 0, behavior: 'smooth' });\n      }\n      this.setState({ active: id });\n    };\n  }\n\n  navLinkStyle(id) {\n    const isActive = this.state.active === id;\n    const color = isActive ? 'oklch(0.92 0.01 250)' : 'oklch(0.58 0.015 190)';\n    const weight = isActive ? 700 : 500;\n    return `display:flex;align-items:center;gap:10px;font-size:13px;font-weight:${weight};color:${color};text-decoration:none;padding:10px 0;transition:color 0.15s ease;`;\n  }\n\n  navNumberStyle(id) {\n    const isActive = this.state.active === id;\n    const color = isActive ? 'oklch(0.6 0.05 190)' : 'oklch(0.42 0.015 190)';\n    return `font-size:11px;color:${color};width:18px;flex-shrink:0;`;\n  }\n\n  renderVals() {\n    const showAvatar = this.state.pastIntro;\n    return {\n      sidebarAvatarStyle: {\n        width: showAvatar ? '32px' : '0px',\n        height: '32px',\n        borderRadius: '50%',\n        backgroundImage: 'url(assets/profile-photo.jpg)',\n        backgroundSize: 'cover',\n        backgroundPosition: 'center 20%',\n        border: showAvatar ? '1px solid oklch(0.32 0.012 250)' : 'none',\n        opacity: showAvatar ? 1 : 0,\n        transform: showAvatar ? 'scale(1)' : 'scale(0.6)',\n        transition: 'all 0.25s ease',\n        flexShrink: 0,\n      },\n      navItems: this.navItems,\n      navItemsComputed: this.navItems.map((item) => ({\n        ...item,\n        linkStyle: this.navLinkStyle(item.id),\n        numberStyle: this.navNumberStyle(item.id),\n        onClick: this.makeScrollHandler(item.id),\n      })),\n\n      experience: this.experience,\n      workProjects: this.workProjects,\n      githubRepos: this.githubRepos,\n      skills: this.skills,\n      sectionLabelStyle: {\n        fontSize: '13px',\n        fontWeight: 700,\n        color: 'oklch(0.55 0.015 250)',\n        letterSpacing: '0.02em',\n        marginBottom: '24px',\n        display: 'flex',\n        alignItems: 'center',\n        gap: '10px',\n      },\n      sectionNumStyle: { color: 'oklch(0.78 0.13 195)' },\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
